# Ensures `npm run build` receives Supabase vars when you deploy from GitHub.
# Add repository secrets: VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY (anon key from Supabase → Settings → API).
name: Frontend build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
